<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    
    <title>Beatriz Jimenez | Data Analyst</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Fondo oscuro de la página (casi negro) */
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-top: 50px;
        }

        /* Tu nombre en grande, color turquesa neón como en la imagen */
        .main-title {
            color: #4df3f5;
            font-weight: 800;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        /* Tu descripción de subtítulo, color gris claro */
        .sub-title {
            color: #8b949e;
            font-weight: 400;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* Iconos pequeños en la descripción (el rayo, el robot) */
        .sub-title i {
            margin-right: 5px;
            color: #c9d1d9;
        }

        /* Etiquetas de habilidades (Pill tags) - El óvalo oscuro con borde */
        .skill-pill {
            background-color: #161b22;
            color: #ffffff;
            border: 1px solid #30363d;
            border-radius: 50px;
            padding: 10px 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        /* Efecto al pasar el mouse por encima de las etiquetas */
        .skill-pill:hover {
            border-color: #4df3f5;
            color: #4df3f5;
            transform: translateY(-3px);
            background-color: transparent;
        }

        /* Sección de Proyectos - Título con icono de cohete */
        .projects-section-title {
            margin-top: 80px;
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 40px;
        }

        /* Efecto de 'Glow' turquesa para el título principal (como en la imagen) */
        .text-glow {
            text-shadow: 0 0 10px rgba(77, 243, 245, 0.7);
        }
        
    </style>
</head>

<body>
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <h1 class="main-title text-glow">Pecky</h1>
                
                <p class="sub-title">
                    <i class="fa-solid fa-bolt"></i> Data Analytics<i class="fa-solid fa-slash fa-rotate-90"></i>
                    <i class="fa-solid fa-brain"></i> Insights Engineer<i class="fa-solid fa-slash fa-rotate-90"></i>
                    <i class="fa-solid fa-gear"></i> Visualization Specialist
                </p>
                
                <div class="d-flex flex-wrap justify-content-center gap-3">
                    <a href="#" class="skill-pill text-decoration-none">
                        <i class="fa-solid fa-database me-2"></i>SQL
                    </a>
                    <a href="#" class="skill-pill text-decoration-none">
                        <i class="fa-solid fa-chart-line me-2"></i>Power BI
                    </a>
                    <a href="#" class="skill-pill text-decoration-none">
                        <i class="fa-solid fa-cloud me-2"></i>Google Colab
                    </a>
                    <a href="#" class="skill-pill text-decoration-none">
                        <i class="fa-solid fa-terminal me-2"></i>Terminal (WSL)
                    </a>
                </div>
                
                <h2 class="projects-section-title">
                    <i class="fa-solid fa-rocket me-2"></i>Proyectos Destacados
                </h2>
                
                <div class="d-grid gap-3 col-md-8 mx-auto mt-5 mb-5">
                    <a href="TU_LINKEDIN_AQUI" class="btn btn-outline-light text-start py-3 fs-6 fw-semibold" target="_blank">
                        <i class="fa-brands fa-linkedin me-3"></i>Conecta en mi perfil de LinkedIn
                    </a>
                    <a href="TU_GITHUB_AQUI" class="btn btn-outline-light text-start py-3 fs-6 fw-semibold" target="_blank">
                        <i class="fa-brands fa-github me-3"></i>Mira mi portafolio completo en GitHub
                    </a>
                    <a href="https://codepen.io/nightcl4w/pen/dEjreJ" class="btn btn-outline-light text-start py-3 fs-6 fw-semibold" target="_blank">
                        <i class="fa-solid fa-code me-3"></i>Inspiración de diseño por OrderMerch
                    </a>
                </div>
                
            </div> </div> </div> <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
